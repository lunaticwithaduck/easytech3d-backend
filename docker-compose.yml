services:
  postgres:
    image: postgres:16
    container_name: etd-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: easytech3d
    ports:
      - "5433:5432"
    volumes:
      - etd-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  etd-pg-data:
